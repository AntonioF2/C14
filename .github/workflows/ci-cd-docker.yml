name: CI/CD Pipeline com Docker

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  # Job 1: Testes
  tests:
    name: Testes Unitários
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Executar testes
        run: pytest tests/ -v --tb=short
      
      - name: Gerar relatório de cobertura
        run: pytest tests/ --cov=. --cov-report=xml --cov-report=html
      
      - name: Upload cobertura
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # Job 2: Build da imagem Docker (paralelo aos testes)
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Login no Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build e Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/conversor-medidas:latest
            ${{ secrets.DOCKER_USERNAME }}/conversor-medidas:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/conversor-medidas:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/conversor-medidas:buildcache,mode=max

  # Job 3: Notificação por e-mail
  notify:
    name: Enviar Notificação
    runs-on: ubuntu-latest
    needs: [tests, build-docker]
    if: always()
    
    steps:
      - name: Verificar status dos jobs
        run: |
          if [[ "${{ needs.tests.result }}" == "failure" || "${{ needs.build-docker.result }}" == "failure" ]]; then
            echo "❌ Pipeline falhou!"
            exit 1
          fi
          echo "✅ Pipeline executado com sucesso!"
      
      - name: Enviar e-mail de sucesso
        if: success()
        run: |
          echo "Pipeline concluído com sucesso!"
          echo "Build: ${{ secrets.DOCKER_USERNAME }}/conversor-medidas:${{ github.sha }}"
